name: Deploy via FTP

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check secrets present
        run: |
          echo "FTP_SERVER set: ${{ secrets.FTP_SERVER != '' }}"
          echo "FTP_USERNAME set: ${{ secrets.FTP_USERNAME != '' }}"
          echo "FTP_PASSWORD set: ${{ secrets.FTP_PASSWORD != '' }}"

      - name: FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/screenshots/**
            **/.claude/**
            **/.playwright-mcp/**
            **/CLAUDE.md
            **/README.md
